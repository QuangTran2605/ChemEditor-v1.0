<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="128" height="128">
  <!-- Design 1: Pen Nib as Nucleus — concentric Bohr model -->

  <!-- Outer electron shell -->
  <circle cx="16" cy="16" r="14" fill="none" stroke="#4a7cff" stroke-width="1.1"/>
  <!-- Inner electron shell -->
  <circle cx="16" cy="16" r="8.5" fill="none" stroke="#4a7cff" stroke-width="1.1"/>

  <!-- Electrons on outer shell (6 electrons, like carbon's reference) -->
  <circle cx="16" cy="2" r="1.6" fill="#ffffff" stroke="#4a7cff" stroke-width="0.7"/>
  <circle cx="28.1" cy="9" r="1.6" fill="#ffffff" stroke="#4a7cff" stroke-width="0.7"/>
  <circle cx="28.1" cy="23" r="1.6" fill="#ffffff" stroke="#4a7cff" stroke-width="0.7"/>
  <circle cx="3.9" cy="23" r="1.6" fill="#ffffff" stroke="#4a7cff" stroke-width="0.7"/>

  <!-- Electrons on inner shell (2 electrons) -->
  <circle cx="8" cy="13.5" r="1.6" fill="#ffffff" stroke="#4a7cff" stroke-width="0.7"/>
  <circle cx="24" cy="18.5" r="1.6" fill="#ffffff" stroke="#4a7cff" stroke-width="0.7"/>

  <!-- Pen nib at center (acts as nucleus) -->
  <path d="M16 21.5 L13 14.5 Q16 13 19 14.5 Z" fill="#4a7cff"/>
  <!-- Nib slit -->
  <line x1="16" y1="20.5" x2="16" y2="15.5" stroke="#ffffff" stroke-width="0.6" stroke-linecap="round"/>
  <!-- Breather hole -->
  <circle cx="16" cy="15.2" r="0.65" fill="#ffffff"/>
</svg>
