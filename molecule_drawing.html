<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Molecule Editor</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">

<script>(function(){var t=localStorage.getItem('smiles-theme');if(t)document.documentElement.setAttribute('data-theme',t);else if(window.matchMedia&&window.matchMedia('(prefers-color-scheme:light)').matches)document.documentElement.setAttribute('data-theme','light');})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root, [data-theme="dark"] {
    --bg: #0c0f13;
    --surface: #151a21;
    --surface-2: #1c222b;
    --border: #2a3140;
    --border-focus: #4a7cff;
    --text: #e4e8ef;
    --text-dim: #7a8599;
    --accent: #4a7cff;
    --accent-glow: rgba(74, 124, 255, 0.15);
    --green: #34d399;
    --green-dim: rgba(52, 211, 153, 0.12);
    --red: #f87171;
    --red-dim: rgba(248, 113, 113, 0.10);
    --orange: #fb923c;
    --svg-bond: #e4e8ef;
    --ambient-glow: rgba(74,124,255,0.06);
    --font-mono: 'IBM Plex Mono', monospace;
    --font-sans: 'DM Sans', sans-serif;
  }

  [data-theme="light"] {
    --bg: #f3f5f9;
    --surface: #ffffff;
    --surface-2: #eaecf2;
    --border: #d0d5df;
    --border-focus: #3b6de8;
    --text: #1a1f2e;
    --text-dim: #5f6878;
    --accent: #3b6de8;
    --accent-glow: rgba(59, 109, 232, 0.12);
    --green: #16a364;
    --green-dim: rgba(22, 163, 100, 0.10);
    --red: #dc2626;
    --red-dim: rgba(220, 38, 38, 0.08);
    --orange: #ea7c1a;
    --svg-bond: #1a1f2e;
    --ambient-glow: rgba(59,109,232,0.04);
  }

  /* -- Loading screen -- */
  #loading-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    z-index: 9999;
    transition: opacity 0.4s ease;
  }
  #loading-screen.fade-out { opacity: 0; pointer-events: none; }
  #loading-screen .ls-spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  #loading-screen .ls-title {
    font-family: var(--font-mono);
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.02em;
  }
  #loading-screen .ls-title .arrow { color: var(--accent); }
  #loading-screen .ls-sub {
    font-size: 0.78rem;
    color: var(--text-dim);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
    overflow-x: hidden;
    transition: background 0.3s, color 0.3s;
  }

  /* -- Ambient background -- */
  body::before {
    content: '';
    position: fixed;
    top: -40%; left: -20%;
    width: 80vw; height: 80vw;
    background: radial-gradient(circle, var(--ambient-glow) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1120px;
    width: 100%;
  }

  /* -- Header -- */
  .header {
    position: relative;
    text-align: center;
    margin-bottom: 2rem;
  }

  .header h1 {
    font-family: var(--font-mono);
    font-size: 1.6rem;
    font-weight: 600;
    letter-spacing: -0.02em;
    margin-bottom: 0.4rem;
  }

  .header h1 .arrow { color: var(--accent); }

  .header p {
    color: var(--text-dim);
    font-size: 0.88rem;
  }

  .header .nav-link {
    display: inline-block;
    margin-top: 0.4rem;
    color: var(--accent);
    font-size: 0.82rem;
    text-decoration: none;
    font-family: var(--font-mono);
    transition: opacity 0.15s;
  }
  .header .nav-link:hover { opacity: 0.75; }

  /* -- Status banner -- */
  .loading-banner {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.4rem;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    font-size: 0.88rem;
    color: var(--text-dim);
  }

  .loading-banner.ready {
    border-color: var(--green);
    background: var(--green-dim);
    color: var(--green);
  }

  .loading-banner.error {
    border-color: var(--red);
    background: var(--red-dim);
    color: var(--red);
  }

  .spinner {
    width: 18px; height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
  }

  /* -- Main layout: side-by-side -- */
  .main-grid {
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 1rem;
    align-items: start;
    margin-bottom: 1rem;
  }

  /* -- Left column: SMILES I/O + Preview -- */
  .left-col {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  /* -- Right column: Editor -- */
  .right-col {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .section-label {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    margin-bottom: 0.6rem;
    font-weight: 500;
  }

  /* -- Editor card -- */
  .editor-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
  }

  #editor-container {
    width: 100%;
    height: 520px;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--border);
    background: #fff;
  }

  #ketcher-frame {
    width: 100%;
    height: 100%;
    border: none;
    border-radius: 8px;
    background: #fff;
  }

  /* -- SMILES I/O card -- */
  .smiles-io-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
  }

  .smiles-input-wrap {
    margin-bottom: 0.75rem;
  }

  .smiles-input-wrap textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.7rem 1rem;
    font-family: var(--font-mono);
    font-size: 0.88rem;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    resize: none;
    overflow-wrap: break-word;
    word-break: break-all;
    min-height: 3.5rem;
    max-height: 200px;
    overflow-y: auto;
    line-height: 1.4;
    field-sizing: content;
  }

  .smiles-input-wrap textarea:focus {
    border-color: var(--border-focus);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .smiles-input-wrap textarea::placeholder { color: var(--text-dim); opacity: 0.6; }

  .smiles-input-wrap textarea.valid {
    border-color: var(--green);
    box-shadow: 0 0 0 3px var(--green-dim);
  }

  .smiles-input-wrap textarea.invalid {
    border-color: var(--red);
    box-shadow: 0 0 0 3px var(--red-dim);
  }

  .smiles-error {
    font-size: 0.78rem;
    color: var(--red);
    font-family: var(--font-mono);
    margin-bottom: 0.5rem;
    display: none;
  }
  .smiles-error.visible { display: block; }

  .action-col {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 0.6rem 1rem;
    font-family: var(--font-sans);
    font-weight: 600;
    font-size: 0.82rem;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    white-space: nowrap;
    text-align: center;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.35rem;
  }

  .btn:hover { opacity: 0.88; }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-secondary {
    background: var(--surface-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.6rem 1rem;
    font-family: var(--font-sans);
    font-weight: 600;
    font-size: 0.82rem;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    text-align: center;
  }

  .btn-secondary:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .btn-secondary:disabled { opacity: 0.4; cursor: not-allowed; }


  /* -- Template chips -- */
  .templates-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.25rem;
  }

  .templates-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    align-items: center;
  }

  .templates-bar .label {
    font-size: 0.72rem;
    color: var(--text-dim);
    padding-top: 0.15rem;
    margin-right: 0.2rem;
  }

  .chip {
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: var(--font-mono);
    font-size: 0.75rem;
    padding: 0.25rem 0.55rem;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .chip:hover {
    color: var(--text);
    border-color: var(--accent);
    background: var(--accent-glow);
  }

  .chip.shuffle-btn {
    color: var(--accent);
    border-color: var(--accent);
    background: transparent;
  }
  .chip.shuffle-btn:hover {
    background: var(--accent-glow);
  }

  /* -- Export toolbar -- */
  .export-toolbar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.25rem;
  }

  .export-buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
  }

  .export-chip.active {
    background: var(--accent-glow);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* -- Theme toggle -- */
  .theme-toggle {
    position: absolute;
    top: 0;
    right: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 38px; height: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text-dim);
    transition: border-color 0.2s, color 0.2s;
    font-size: 1.1rem;
    line-height: 1;
  }

  .theme-toggle:hover {
    border-color: var(--accent);
    color: var(--text);
  }

  .theme-toggle .icon-sun,
  .theme-toggle .icon-moon { pointer-events: none; }

  [data-theme="light"] .theme-toggle .icon-sun { display: none; }
  [data-theme="light"] .theme-toggle .icon-moon { display: inline; }
  :root .theme-toggle .icon-sun,
  [data-theme="dark"] .theme-toggle .icon-sun { display: inline; }
  :root .theme-toggle .icon-moon,
  [data-theme="dark"] .theme-toggle .icon-moon { display: none; }

  /* -- Responsive -- */
  @media (max-width: 800px) {
    .main-grid {
      grid-template-columns: 1fr;
    }
    .left-col { order: 2; }
    .right-col { order: 1; }
    #editor-container { height: 400px; }
  }

  @media (max-width: 520px) {
    #editor-container { height: 320px; }
    .action-col { flex-direction: column; }
    .header h1 { font-size: 1.3rem; }
  }
</style>
</head>
<body>

<div id="loading-screen">
  <div class="ls-spinner"></div>
  <div class="ls-title">Molecule <span class="arrow">Editor</span></div>
  <div class="ls-sub">Loading Ketcher editor...</div>
</div>

<div class="container">
  <div class="header">
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle light/dark mode">
      <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
    <h1>Molecule <span class="arrow">Editor</span></h1>

  <div class="loading-banner" id="status-banner">

  <!-- Side-by-side: Left = SMILES I/O, Right = Editor -->
  <div class="main-grid">

        <div class="section-label" id="io-label">SMILES</div>

        </div>

        <div class="action-col">

          <button class="btn-secondary" id="copy-btn" disabled data-copy="">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Copy
          </button>
          <button class="btn-secondary" id="send-btn" disabled>
            Analyze in Formula Converter &rarr;
          </button>
          <button class="btn-secondary" id="clear-btn" disabled>

      <!-- Template molecule chips -->
      <div class="templates-section">

    <!-- Right column -->

      <div class="export-toolbar">

          <button class="chip export-chip active" data-format="smiles">SMILES</button>
          <button class="chip export-chip" data-format="molfile">Molfile</button>
          <button class="chip export-chip" data-format="inchi">InChI</button>
          <button class="chip export-chip" data-format="inchikey">InChIKey</button>
          <button class="chip export-chip" data-format="smarts">SMARTS</button>
          <button class="chip export-chip" data-format="rxn">RXN</button>
          <button class="chip export-chip" data-format="cdxml">CDXML</button>

      </div>

      <div class="editor-card">
        <div class="section-label">Structure Editor</div>
        <!-- Ketcher standalone build (EPAM, Apache 2.0) served from same origin.
             Built from https://github.com/epam/ketcher — see ketcher/ directory. -->
        <div id="editor-container">
          <iframe
            id="ketcher-frame"
            src="ketcher/index.html"
            title="Ketcher Chemical Structure Editor"
            sandbox="allow-scripts allow-same-origin"

          ></iframe>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- RDKit.js for export format conversions -->
<script src="https://unpkg.com/@rdkit/rdkit@2025.3.4-1.0.0/dist/RDKit_minimal.js"></script>

<script>
  // ── KetcherBridge — same-origin direct API access ──
  // Ketcher (EPAM) is served from the same origin via ketcher/index.html.
  // It sends { eventType: 'init' } via postMessage when ready, then exposes
  // iframe.contentWindow.ketcher with the full Ketcher API.
  class KetcherBridge {
    constructor(iframeElement, options = {}) {
      this.iframe = iframeElement;
      this.onReady = options.onReady || (() => {});
      this.readyTimeout = options.readyTimeout || 30000;
      this._ketcher = null;
      this._ready = false;

      // Listen for Ketcher's init event (uses eventType, not type)
      this._messageHandler = (event) => {
        if (event.data && event.data.eventType === 'init') {
          this._ready = true;
          clearTimeout(this._readyTimer);
          // Access the Ketcher API directly (same-origin)
          this._ketcher = this.iframe.contentWindow.ketcher;
          this.onReady();
        }
      };
      window.addEventListener('message', this._messageHandler);

      this._readyTimer = setTimeout(() => {
        if (!this._ready) {
          if (options.onError) {
            options.onError('Could not load Ketcher editor. Check your internet connection.');
          }
        }
      }, this.readyTimeout);
    }

    async getSmiles() {
      if (!this._ketcher) throw new Error('Ketcher not ready');
      return await this._ketcher.getSmiles();
    }

    async setMolecule(structureString) {
      if (!this._ketcher) throw new Error('Ketcher not ready');
      await this._ketcher.setMolecule(structureString);
    }

    async clear() {
      if (!this._ketcher) throw new Error('Ketcher not ready');
      // Ketcher API: setMolecule with empty string clears the canvas
      await this._ketcher.setMolecule('');
    }

    // Inject CSS into the same-origin Ketcher iframe
    injectCSS(css) {
      try {
        const doc = this.iframe.contentDocument || this.iframe.contentWindow.document;
        const style = doc.createElement('style');
        style.textContent = css;
        doc.head.appendChild(style);
      } catch (e) {
        console.warn('Could not inject CSS into Ketcher iframe:', e);
      }
    }

    destroy() {
      window.removeEventListener('message', this._messageHandler);
      clearTimeout(this._readyTimer);
    }
  }

  // ── Globals ──
  let ketcherBridge = null;
  let activeExportFormat = 'smiles';
  let currentSmiles = '';
  let RDKit = null;
  let isUpdating = false;

  // ── DOM refs ──
  const smilesInput     = document.getElementById('smiles-input');
  const smilesError     = document.getElementById('smiles-error');
  const copyBtn         = document.getElementById('copy-btn');
  const sendBtn         = document.getElementById('send-btn');
  const clearBtn        = document.getElementById('clear-btn');
  const convertBtn      = document.getElementById('convert-btn');
  const statusBanner    = document.getElementById('status-banner');
  const statusSpinner   = document.getElementById('status-spinner');
  const statusText      = document.getElementById('status-text');
  const ketcherFrame    = document.getElementById('ketcher-frame');
  const ioLabel         = document.getElementById('io-label');

  // ── Template molecules ──
  const TEMPLATES = [
    { name: 'Benzene',       smiles: 'c1ccccc1' },
    { name: 'Cyclohexane',   smiles: 'C1CCCCC1' },
    { name: 'Cyclopentane',  smiles: 'C1CCCC1' },
    { name: 'Pyridine',      smiles: 'c1ccncc1' },
    { name: 'Furan',         smiles: 'c1ccoc1' },
    { name: 'Thiophene',     smiles: 'c1ccsc1' },
    { name: 'Imidazole',     smiles: 'c1cnc[nH]1' },
    { name: 'Naphthalene',   smiles: 'c1ccc2ccccc2c1' },
    { name: 'Phenol',        smiles: 'Oc1ccccc1' },
    { name: 'Aniline',       smiles: 'Nc1ccccc1' },
    { name: 'Acetic acid',   smiles: 'CC(=O)O' },
    { name: 'Methanol',      smiles: 'CO' },
    { name: 'Ethanol',       smiles: 'CCO' },
    { name: 'Acetone',       smiles: 'CC(C)=O' },
    { name: 'Caffeine',      smiles: 'Cn1c(=O)c2c(ncn2C)n(C)c1=O' },
    { name: 'Aspirin',       smiles: 'CC(=O)Oc1ccccc1C(=O)O' },
    { name: 'Glucose',       smiles: 'OC[C@H]1OC(O)[C@H](O)[C@@H](O)[C@@H]1O' },
    { name: 'Indole',        smiles: 'c1ccc2[nH]ccc2c1' },
    { name: 'Quinoline',     smiles: 'c1ccnc2ccccc12' },
    { name: 'Toluene',       smiles: 'Cc1ccccc1' },
    { name: 'Glycine',       smiles: 'NCC(=O)O' },
    { name: 'Alanine',       smiles: 'C[C@@H](N)C(=O)O' },
    { name: 'Urea',          smiles: 'NC(N)=O' },
    { name: 'Piperidine',    smiles: 'C1CCNCC1' },
  ];

  // ── Render template chips ──
  function renderTemplateChips() {
    const bar = document.getElementById('templates-bar');
    const label = bar.querySelector('.label');
    bar.innerHTML = '';
    bar.appendChild(label);

    const shuffled = [...TEMPLATES].sort(() => Math.random() - 0.5);
    shuffled.slice(0, 10).forEach(tmpl => {
      const btn = document.createElement('button');
      btn.className = 'chip';
      btn.textContent = tmpl.name;
      btn.addEventListener('click', () => loadSmiles(tmpl.smiles));
      bar.appendChild(btn);
    });

    const shuffleBtn = document.createElement('button');
    shuffleBtn.className = 'chip shuffle-btn';
    shuffleBtn.textContent = 'Shuffle';
    shuffleBtn.addEventListener('click', renderTemplateChips);
    bar.appendChild(shuffleBtn);
  }

  // ── Load SMILES into editor (clears first, then sets) ──
  async function loadSmiles(smiles) {
    if (!ketcherBridge || !smiles) return false;
    try {
      isUpdating = true;
      await ketcherBridge.setMolecule(smiles);
      currentSmiles = smiles;
      if (activeExportFormat === 'smiles') {
        smilesInput.value = smiles;
        updateCopyData(smiles);
      } else {
        refreshExport();
      }
      clearSmilesError();
      smilesInput.classList.remove('invalid');
      smilesInput.classList.add('valid');
      return true;
    } catch (e) {
      console.error('Failed to load SMILES:', smiles, e);
      return false;
    } finally {
      isUpdating = false;
    }
  }

  // ── Convert: if textarea has SMILES → load into editor; if empty → get from editor ──
  async function convert() {
    if (isUpdating || !ketcherBridge) return;
    const smiles = smilesInput.value.trim();
    if (smiles) {
      // Push textarea SMILES into editor
      const success = await loadSmiles(smiles);
      if (!success) {
        showSmilesError('Invalid SMILES string');
        updateCopyData('');
      }
    } else {
      // Pull SMILES from editor into textarea
      try {
        const editorSmiles = await ketcherBridge.getSmiles();
        currentSmiles = editorSmiles || '';
        if (activeExportFormat === 'smiles') {
          smilesInput.value = currentSmiles;
          updateCopyData(currentSmiles);
        } else {
          refreshExport();
        }
        clearSmilesError();
        if (currentSmiles) {
          smilesInput.classList.add('valid');
          smilesInput.classList.remove('invalid');
        } else {
          smilesInput.classList.remove('valid', 'invalid');
        }
      } catch (e) {
        console.error('Failed to get SMILES:', e);
        showSmilesError('Could not read SMILES from editor');
      }
    }
  }

  // ── Update copy button data ──
  function updateCopyData(text) {
    copyBtn.setAttribute('data-copy', text || '');
    copyBtn.disabled = !text;
    sendBtn.disabled = !currentSmiles;
  }

  // ── SMILES error display ──
  function showSmilesError(msg) {
    smilesError.textContent = msg;
    smilesError.classList.add('visible');
    smilesInput.classList.remove('valid');
    smilesInput.classList.add('invalid');
  }

  function clearSmilesError() {
    smilesError.classList.remove('visible');
    smilesInput.classList.remove('invalid');
  }

  // ── Copy to clipboard ──
  function copyToClipboard(btn) {
    const text = btn.getAttribute('data-copy');
    if (!text) return;
    navigator.clipboard.writeText(text).then(() => {
      btn.classList.add('copied');
      const orig = btn.innerHTML;
      const checkIcon = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
      btn.innerHTML = checkIcon + ' Copied!';
      setTimeout(() => { btn.classList.remove('copied'); btn.innerHTML = orig; }, 1500);
    });
  }

  // ── Send to formula converter (always uses SMILES) ──
  function sendToConverter() {
    if (!currentSmiles) return;
    window.open('smiles_to_formula.html?smiles=' + encodeURIComponent(currentSmiles), '_blank');
  }

  // ── Clear editor ──
  async function clearEditor() {
    if (!ketcherBridge) return;
    isUpdating = true;
    try {
      await ketcherBridge.clear();
    } catch (e) {
      console.error('Clear failed:', e);
    }
    currentSmiles = '';
    smilesInput.value = '';
    updateCopyData('');
    clearSmilesError();
    smilesInput.classList.remove('valid', 'invalid');
    isUpdating = false;
  }

  // ── Export format toolbar ──
  function initExportToolbar() {
    const chips = document.querySelectorAll('.export-chip');
    chips.forEach(chip => {
      chip.addEventListener('click', () => {
        chips.forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        activeExportFormat = chip.dataset.format;
        updateExportLabel();
        refreshExport();
      });
    });
  }

  function updateExportLabel() {
    const labelMap = {
      smiles: 'SMILES',
      molfile: 'Molfile',
      inchi: 'InChI',
      inchikey: 'InChIKey',
      smarts: 'SMARTS',
      rxn: 'RXN',
      cdxml: 'CDXML'
    };
    ioLabel.textContent = labelMap[activeExportFormat] || 'SMILES';
  }

  async function refreshExport() {
    if (!currentSmiles && activeExportFormat !== 'smiles') {
      return;
    }

    switch (activeExportFormat) {
      case 'smiles':
        smilesInput.value = currentSmiles;
        updateCopyData(currentSmiles);
        break;
      case 'molfile':
        if (RDKit) {
          const mol = RDKit.get_mol(currentSmiles);
          if (mol && mol.is_valid()) {
            const molblock = mol.get_molblock();
            smilesInput.value = molblock;
            updateCopyData(molblock);
            mol.delete();
          }
        } else {
          smilesInput.value = 'Loading RDKit...';
          updateCopyData('');
        }
        break;
      case 'inchi':
        if (RDKit) {
          const mol2 = RDKit.get_mol(currentSmiles);
          if (mol2 && mol2.is_valid()) {
            const inchi = mol2.get_inchi();
            smilesInput.value = inchi;
            updateCopyData(inchi);
            mol2.delete();
          }
        } else {
          smilesInput.value = 'Loading RDKit...';
          updateCopyData('');
        }
        break;
      case 'inchikey':
        if (RDKit) {
          const mol3 = RDKit.get_mol(currentSmiles);
          if (mol3 && mol3.is_valid()) {
            const inchi3 = mol3.get_inchi();
            try {
              const key = RDKit.get_inchikey_for_inchi(inchi3);
              smilesInput.value = key;
              updateCopyData(key);
            } catch {
              smilesInput.value = 'InChIKey generation not available';
              updateCopyData('');
            }
            mol3.delete();
          }
        } else {
          smilesInput.value = 'Loading RDKit...';
          updateCopyData('');
        }
        break;
      case 'smarts':
        try {
          const smarts = await ketcherBridge._ketcher.getSmarts();
          smilesInput.value = smarts;
          updateCopyData(smarts);
        } catch (e) {
          smilesInput.value = 'SMARTS export failed: ' + e.message;
          updateCopyData('');
        }
        break;
      case 'rxn':
        try {
          const rxn = await ketcherBridge._ketcher.getRxn();
          smilesInput.value = rxn;
          updateCopyData(rxn);
        } catch (e) {
          smilesInput.value = 'RXN export failed: ' + e.message;
          updateCopyData('');
        }
        break;
      case 'cdxml':
        try {
          const cdxml = await ketcherBridge._ketcher.getCDXml();
          smilesInput.value = cdxml;
          updateCopyData(cdxml);
        } catch (e) {
          smilesInput.value = 'CDXML export failed: ' + e.message;
          updateCopyData('');
        }
        break;
    }
  }

  // ── Initialize Ketcher ──
  function onKetcherReady() {
    // Hide 3D viewer and fullscreen buttons via CSS injection (same-origin)
    ketcherBridge.injectCSS(`
      [data-testid="3D Viewer button"],
      [data-testid="fullscreen-mode-button"] {
        display: none !important;
      }
    `);

    const loadingScreen = document.getElementById('loading-screen');
    if (loadingScreen) {
      loadingScreen.classList.add('fade-out');
      setTimeout(() => loadingScreen.remove(), 500);
    }

    statusBanner.classList.add('ready');
    statusSpinner.outerHTML = '<div class="dot"></div>';
    statusText.textContent = 'Editor ready \u2014 draw a molecule or type SMILES';

    smilesInput.disabled = false;
    clearBtn.disabled = false;
    convertBtn.disabled = false;

    // Enter key in textarea triggers convert
    smilesInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        convert();
      }
    });

    convertBtn.addEventListener('click', convert);
    copyBtn.addEventListener('click', () => copyToClipboard(copyBtn));
    sendBtn.addEventListener('click', sendToConverter);
    clearBtn.addEventListener('click', clearEditor);

    // Ensure iframe gets keyboard focus when clicked
    document.getElementById('editor-container').addEventListener('click', () => {
      ketcherFrame.focus();
    });

    initExportToolbar();
    renderTemplateChips();
    loadFromUrl();

    // Give Ketcher iframe initial focus for keyboard input
    setTimeout(() => ketcherFrame.focus(), 500);
  }

  ketcherBridge = new KetcherBridge(ketcherFrame, {
    onReady: () => {
      onKetcherReady();
    },
    onError: (msg) => {
      const loadingScreen = document.getElementById('loading-screen');
      if (loadingScreen) {
        loadingScreen.classList.add('fade-out');
        setTimeout(() => loadingScreen.remove(), 500);
      }
      statusBanner.classList.add('error');
      statusSpinner.style.display = 'none';
      statusText.textContent = msg;
    },
    readyTimeout: 30000
  });

  // ── Load from URL param ──
  function loadFromUrl() {
    const smiles = new URLSearchParams(window.location.search).get('smiles');
    if (smiles) loadSmiles(smiles);
  }

  // ── RDKit for export format conversions (non-blocking) ──
  if (typeof initRDKitModule === 'function') {
    initRDKitModule({
      locateFile: () => 'https://unpkg.com/@rdkit/rdkit@2025.3.4-1.0.0/dist/RDKit_minimal.wasm'
    }).then(mod => {
      RDKit = mod;
    }).catch(e => {
      console.warn('RDKit failed to load (export conversions unavailable):', e);
    });
  }

  // ── Theme toggle ──
  (function initTheme() {
    const saved = localStorage.getItem('smiles-theme');
    if (saved) {
      document.documentElement.setAttribute('data-theme', saved);
    } else if (window.matchMedia('(prefers-color-scheme: light)').matches) {
      document.documentElement.setAttribute('data-theme', 'light');
    }
  })();

  document.getElementById('theme-toggle').addEventListener('click', () => {
    const current = document.documentElement.getAttribute('data-theme');
    const next = current === 'light' ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('smiles-theme', next);
  });
</script>
</body>
</html>
