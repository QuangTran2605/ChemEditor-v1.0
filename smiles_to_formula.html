<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMILES → Formula</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">

<script>(function(){var t=localStorage.getItem('smiles-theme');if(t)document.documentElement.setAttribute('data-theme',t);else if(window.matchMedia&&window.matchMedia('(prefers-color-scheme:light)').matches)document.documentElement.setAttribute('data-theme','light');})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root, [data-theme="dark"] {
    --bg: #0c0f13;
    --surface: #151a21;
    --surface-2: #1c222b;
    --border: #2a3140;
    --border-focus: #4a7cff;
    --text: #e4e8ef;
    --text-dim: #7a8599;
    --accent: #4a7cff;
    --accent-glow: rgba(74, 124, 255, 0.15);
    --green: #34d399;
    --green-dim: rgba(52, 211, 153, 0.12);
    --red: #f87171;
    --red-dim: rgba(248, 113, 113, 0.10);
    --orange: #fb923c;
    --svg-bond: #e4e8ef;
    --ambient-glow: rgba(74,124,255,0.06);
    --font-mono: 'IBM Plex Mono', monospace;
    --font-sans: 'DM Sans', sans-serif;
  }

  [data-theme="light"] {
    --bg: #f3f5f9;
    --surface: #ffffff;
    --surface-2: #eaecf2;
    --border: #d0d5df;
    --border-focus: #3b6de8;
    --text: #1a1f2e;
    --text-dim: #5f6878;
    --accent: #3b6de8;
    --accent-glow: rgba(59, 109, 232, 0.12);
    --green: #16a364;
    --green-dim: rgba(22, 163, 100, 0.10);
    --red: #dc2626;
    --red-dim: rgba(220, 38, 38, 0.08);
    --orange: #ea7c1a;
    --svg-bond: #1a1f2e;
    --ambient-glow: rgba(59,109,232,0.04);
  }

  /* ── Loading screen ── */
  #loading-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    z-index: 9999;
    transition: opacity 0.4s ease;
  }
  #loading-screen.fade-out { opacity: 0; pointer-events: none; }
  #loading-screen .ls-spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  #loading-screen .ls-title {
    font-family: var(--font-mono);
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.02em;
  }
  #loading-screen .ls-title .arrow { color: var(--accent); }
  #loading-screen .ls-sub {
    font-size: 0.78rem;
    color: var(--text-dim);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
    overflow-x: hidden;
    transition: background 0.3s, color 0.3s;
  }

  /* ── Ambient background ── */
  body::before {
    content: '';
    position: fixed;
    top: -40%; left: -20%;
    width: 80vw; height: 80vw;
    background: radial-gradient(circle, var(--ambient-glow) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 720px;
    width: 100%;
  }

  /* ── Header ── */
  .header {
    position: relative;
    text-align: center;
    margin-bottom: 2.5rem;
  }

  .header h1 {
    font-family: var(--font-mono);
    font-size: 1.6rem;
    font-weight: 600;
    letter-spacing: -0.02em;
    margin-bottom: 0.4rem;
  }

  .header h1 .arrow { color: var(--accent); }

  .header p {
    color: var(--text-dim);
    font-size: 0.88rem;
  }

  .loading-banner {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.4rem;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    font-size: 0.88rem;
    color: var(--text-dim);
  }

  .loading-banner.ready {
    border-color: var(--green);
    background: var(--green-dim);
    color: var(--green);
  }

  .loading-banner.error {
    border-color: var(--red);
    background: var(--red-dim);
    color: var(--red);
  }

  .spinner {
    width: 18px; height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
  }

  /* ── Input area ── */
  .input-group {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    margin-bottom: 1rem;
  }

  .input-row {
    display: flex;
    gap: 0.6rem;
  }

  .input-row input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.7rem 1rem;
    font-family: var(--font-mono);
    font-size: 0.95rem;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }

  .input-row input:focus {
    border-color: var(--border-focus);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .input-row input::placeholder { color: var(--text-dim); opacity: 0.6; }

  .btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 0.7rem 1.4rem;
    font-family: var(--font-sans);
    font-weight: 600;
    font-size: 0.88rem;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    white-space: nowrap;
  }

  .btn:hover { opacity: 0.88; }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Example chips ── */
  .examples {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-top: 0.9rem;
  }

  .examples span {
    font-size: 0.72rem;
    color: var(--text-dim);
    padding-top: 0.15rem;
    margin-right: 0.2rem;
  }

  .chip {
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: var(--font-mono);
    font-size: 0.78rem;
    padding: 0.3rem 0.65rem;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .chip:hover {
    color: var(--text);
    border-color: var(--accent);
    background: var(--accent-glow);
  }

  /* ── Results ── */
  .results {
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.35s ease, transform 0.35s ease;
    pointer-events: none;
  }

  .results.visible {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }

  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1rem;
  }

  .formula-display {
    text-align: center;
    padding: 1.2rem 0 1rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 1.2rem;
  }

  .formula-display .formula {
    font-family: var(--font-mono);
    font-size: 2.4rem;
    font-weight: 600;
    letter-spacing: 0.02em;
    color: var(--text);
  }

  .formula-display .name-label {
    font-size: 0.82rem;
    color: var(--text-dim);
    margin-top: 0.3rem;
  }

  .meta-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.9rem;
  }

  .meta-item {
    background: var(--bg);
    border-radius: 8px;
    padding: 0.8rem 1rem;
  }

  .meta-item .label {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    margin-bottom: 0.3rem;
  }

  .meta-item .value {
    font-family: var(--font-mono);
    font-size: 0.88rem;
    color: var(--text);
    word-break: break-all;
  }

  /* ── Structure rendering ── */
  .structure-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    text-align: center;
  }

  .structure-card .section-label {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    margin-bottom: 0.8rem;
  }

  #structure-svg {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 200px;
  }

  #structure-svg svg {
    max-width: 100%;
    height: auto;
  }

  /* ── Atom breakdown bar ── */
  .atom-bar-section {
    margin-top: 1rem;
  }

  .atom-bar-section .section-label {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    margin-bottom: 0.6rem;
  }

  .atom-bar-track {
    display: flex;
    height: 28px;
    border-radius: 6px;
    overflow: hidden;
    gap: 2px;
  }

  .atom-bar-segment {
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-mono);
    font-size: 0.72rem;
    font-weight: 500;
    color: #fff;
    min-width: 32px;
    transition: flex 0.4s ease;
  }

  .atom-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 0.6rem;
    margin-top: 0.5rem;
  }

  .atom-legend-item {
    display: flex;
    align-items: center;
    gap: 0.3rem;
    font-size: 0.78rem;
    color: var(--text-dim);
    font-family: var(--font-mono);
  }

  .legend-swatch {
    width: 10px; height: 10px;
    border-radius: 3px;
  }

  /* ── 3D Viewer ── */
  .viewer-3d-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    margin-top: 1rem;
  }

  .viewer-3d-card .section-label {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    margin-bottom: 0.8rem;
  }

  #viewer-3d-container {
    width: 100%;
    height: 350px;
    position: relative;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .viewer-3d-controls {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-top: 0.8rem;
    align-items: center;
  }

  .viewer-3d-controls .control-label {
    font-size: 0.72rem;
    color: var(--text-dim);
    padding-top: 0.15rem;
    margin-right: 0.2rem;
  }

  .style-btn {
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: var(--font-sans);
    font-size: 0.78rem;
    font-weight: 500;
    padding: 0.3rem 0.65rem;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .style-btn:hover {
    color: var(--text);
    border-color: var(--accent);
    background: var(--accent-glow);
  }

  .style-btn.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  .viewer-3d-info {
    font-size: 0.72rem;
    color: var(--text-dim);
    margin-top: 0.5rem;
    font-style: italic;
  }

  .viewer-3d-loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 0.6rem;
    color: var(--text-dim);
    font-size: 0.82rem;
  }

  .viewer-3d-loading .spinner {
    width: 22px; height: 22px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  .viewer-3d-source {
    font-size: 0.66rem;
    color: var(--text-dim);
    opacity: 0.7;
    font-style: italic;
    margin-top: 0.2rem;
  }

  .viewer-3d-spin-controls {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    margin-top: 0.6rem;
    padding-top: 0.6rem;
    border-top: 1px solid var(--border);
  }

  .spin-toggle {
    display: flex;
    align-items: center;
    gap: 0.35rem;
    font-size: 0.78rem;
    color: var(--text-dim);
    cursor: pointer;
    white-space: nowrap;
  }

  .spin-toggle input[type="checkbox"] {
    accent-color: var(--accent);
    width: 14px;
    height: 14px;
    cursor: pointer;
  }

  #spin-speed {
    flex: 1;
    max-width: 140px;
    height: 4px;
    accent-color: var(--accent);
    cursor: pointer;
  }

  #spin-speed:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  .spin-speed-label {
    font-family: var(--font-mono);
    font-size: 0.72rem;
    color: var(--text-dim);
    min-width: 2.5em;
  }

  /* ── Copy button ── */
  .copy-btn {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-dim);
    cursor: pointer;
    padding: 0.3rem 0.5rem;
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    font-family: var(--font-mono);
    font-size: 0.68rem;
    transition: all 0.15s;
    vertical-align: middle;
    white-space: nowrap;
  }

  .copy-btn:hover {
    border-color: var(--accent);
    color: var(--text);
  }

  .copy-btn.copied {
    border-color: var(--green);
    color: var(--green);
  }

  .copy-btn svg { pointer-events: none; flex-shrink: 0; }

  .formula-actions {
    display: flex;
    justify-content: center;
    gap: 0.5rem;
    margin-top: 0.5rem;
  }

  .value-row {
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .value-row .value { flex: 1; }

  /* ── Mass percentage table ── */
  .mass-pct-section {
    margin-top: 0.8rem;
  }

  .mass-pct-table {
    width: 100%;
    border-collapse: collapse;
    font-family: var(--font-mono);
    font-size: 0.78rem;
  }

  .mass-pct-table th {
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--text-dim);
    font-weight: 500;
    text-align: left;
    padding: 0.35rem 0.5rem;
    border-bottom: 1px solid var(--border);
  }

  .mass-pct-table th:not(:first-child) { text-align: right; }

  .mass-pct-table td {
    padding: 0.35rem 0.5rem;
    color: var(--text);
  }

  .mass-pct-table td:not(:first-child) { text-align: right; }

  .mass-pct-table tr:not(:last-child) td {
    border-bottom: 1px solid var(--border);
  }

  .mass-pct-bar {
    display: inline-block;
    height: 6px;
    border-radius: 3px;
    margin-right: 0.4rem;
    vertical-align: middle;
  }

  /* ── Error ── */
  .error-msg {
    background: var(--red-dim);
    border: 1px solid var(--red);
    border-radius: 10px;
    padding: 0.9rem 1.2rem;
    color: var(--red);
    font-size: 0.88rem;
    font-family: var(--font-mono);
  }

  /* ── History ── */
  .history-section { margin-top: 2rem; }

  .history-section .section-label {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    margin-bottom: 0.6rem;
  }

  .history-list {
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
  }

  .history-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.55rem 0.9rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: border-color 0.15s;
    font-size: 0.82rem;
  }

  .history-item:hover { border-color: var(--accent); }
  .history-item .smiles-col { font-family: var(--font-mono); color: var(--text); }
  .history-item .formula-col { font-family: var(--font-mono); color: var(--accent); }

  /* ── Theme toggle ── */
  .theme-toggle {
    position: absolute;
    top: 0;
    right: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 38px; height: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text-dim);
    transition: border-color 0.2s, color 0.2s;
    font-size: 1.1rem;
    line-height: 1;
  }

  .theme-toggle:hover {
    border-color: var(--accent);
    color: var(--text);
  }

  .theme-toggle .icon-sun,
  .theme-toggle .icon-moon { pointer-events: none; }

  [data-theme="light"] .theme-toggle .icon-sun { display: none; }
  [data-theme="light"] .theme-toggle .icon-moon { display: inline; }
  :root .theme-toggle .icon-sun,
  [data-theme="dark"] .theme-toggle .icon-sun { display: inline; }
  :root .theme-toggle .icon-moon,
  [data-theme="dark"] .theme-toggle .icon-moon { display: none; }

  /* ── NMR Prediction ── */
  .nmr-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    margin-top: 1rem;
  }

  .nmr-card .section-label {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    margin-bottom: 0.8rem;
  }

  .nmr-card .section-label sup {
    font-size: 0.6em;
    vertical-align: super;
    line-height: 0;
  }

  .nmr-freq-badge {
    display: inline-block;
    font-size: 0.62rem;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.1rem 0.35rem;
    margin-left: 0.4rem;
    vertical-align: middle;
    text-transform: none;
    letter-spacing: 0;
    color: var(--text-dim);
    font-family: var(--font-mono);
  }

  .nmr-spectrum-container {
    width: 100%;
    margin-bottom: 1rem;
    position: relative;
  }

  .nmr-toolbar {
    display: flex;
    align-items: center;
    gap: 0.35rem;
    padding: 0.35rem 0.5rem;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 8px 8px 0 0;
    flex-wrap: wrap;
  }

  .nmr-toolbar .nmr-tb-group {
    display: flex;
    align-items: center;
    gap: 0.2rem;
  }

  .nmr-toolbar .nmr-tb-sep {
    width: 1px;
    height: 18px;
    background: var(--border);
    margin: 0 0.2rem;
  }

  .nmr-toolbar .nmr-tb-label {
    font-size: 0.62rem;
    color: var(--text-dim);
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-right: 0.15rem;
    user-select: none;
  }

  .nmr-tb-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 26px;
    height: 26px;
    border: 1px solid var(--border);
    border-radius: 5px;
    background: var(--surface);
    color: var(--text-dim);
    font-size: 0.72rem;
    font-family: var(--font-mono);
    cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    padding: 0;
    line-height: 1;
    user-select: none;
  }

  .nmr-tb-btn:hover {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  .nmr-tb-btn.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  .nmr-tb-btn svg {
    width: 14px;
    height: 14px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .nmr-range-input {
    width: 42px;
    height: 26px;
    border: 1px solid var(--border);
    border-radius: 5px;
    background: var(--surface);
    color: var(--text);
    font-size: 0.68rem;
    font-family: var(--font-mono);
    text-align: center;
    padding: 0 0.15rem;
    outline: none;
    transition: border-color 0.15s;
    -moz-appearance: textfield;
  }

  .nmr-range-input::-webkit-inner-spin-button,
  .nmr-range-input::-webkit-outer-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
